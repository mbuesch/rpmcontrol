name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env: 
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  install_dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update
      - run: sudo apt-get install -y gcc-avr binutils-avr avr-libc avrdude libglib2.0-dev libgtk-4-dev

  rpmcontrol_firmware:
    name: rpmcontrol firmware
    needs: install_dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./firmware/
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os }}-nightly
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-nightly

      - run: rustup update nightly
      - run: rustup default nightly
      - run: rustup component add clippy
      - run: cargo install --git https://github.com/mbuesch/avr-postprocess.git --branch main

      - run: cargo clippy -- --deny warnings
      - run: cargo clippy --tests -- --deny warnings
      - run: make
      - run: make DEBUG=
      - run: make MONITORING=

  motmock_firmware:
    name: motmock firmware
    needs: install_dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./motmock/firmware/
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os }}-nightly
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-nightly

      - run: rustup update nightly
      - run: rustup default nightly
      - run: rustup component add clippy

      - run: cargo clippy -- --deny warnings
      - run: cargo clippy --tests -- --deny warnings
      - run: make

  debugtool:
    name: Debug tool
    needs: install_dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./debugtool/
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os }}-stable
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-stable

      - run: rustup update stable
      - run: rustup default stable
      - run: rustup component add clippy

      - run: cargo clippy -- --deny warnings
      - run: cargo clippy --tests -- --deny warnings
      - run: cargo build
      - run: cargo test

